<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密核心 - 舰队指挥系统动态演示</title>
    <!-- CDN Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --primary: #3b82f6;
            --bg-dark: #070b14;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.1);
            z-index: 1000;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        .login-bg {
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 50%, #020617 100%);
        }

        /* Standard Tailwind does not include all animations by default in CDN */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Custom Hook for Dynamic Updates ---
        const useInterval = (callback, delay) => {
            const savedCallback = useRef();
            useEffect(() => { savedCallback.current = callback; }, [callback]);
            useEffect(() => {
                if (delay !== null) {
                    const id = setInterval(() => savedCallback.current(), delay);
                    return () => clearInterval(id);
                }
            }, [delay]);
        };

        // --- Icon Component ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconInstance = lucide.icons[name];
                    if (iconInstance) {
                        iconRef.current.innerHTML = iconInstance.toSvg({ class: className, 'stroke-width': 2 });
                    }
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center" />;
        };

        // --- Login Page ---
        const LoginPage = ({ onLogin }) => {
            const [loading, setLoading] = useState(false);
            const [verifyCode, setVerifyCode] = useState('8K2B');

            const refreshCode = () => {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let res = '';
                for(let i=0; i<4; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
                setVerifyCode(res);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => { onLogin(); setLoading(false); }, 1500);
            };

            return (
                <div className="fixed inset-0 z-[100] login-bg flex items-center justify-center p-6 text-white">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none"></div>
                    
                    <div className="glass-card w-full max-w-[420px] p-10 rounded-3xl shadow-2xl relative overflow-hidden border border-white/10 slide-up">
                        <div className="flex flex-col items-center mb-10 text-center">
                            <div className="mb-6 p-4 bg-blue-600/20 rounded-2xl border border-blue-500/20 text-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                                <Icon name="Shield" className="w-10 h-10" />
                            </div>
                            <h1 className="text-2xl font-bold font-headline uppercase tracking-widest text-white mb-2 underline decoration-blue-500 underline-offset-8">精密核心 指挥系统</h1>
                            <p className="text-[10px] text-gray-500 font-bold uppercase tracking-[0.4em] mt-3">Precision Core Fleet OS v2.4</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-4">
                                <div className="relative group">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors"><Icon name="User" /></div>
                                    <input required className="w-full bg-black/40 border border-white/5 rounded-xl py-4 pl-12 pr-4 text-sm outline-none focus:border-blue-500/50 transition-all text-white placeholder-gray-600" placeholder="账号" />
                                </div>
                                <div className="relative group">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors"><Icon name="Lock" /></div>
                                    <input required type="password" className="w-full bg-black/40 border border-white/5 rounded-xl py-4 pl-12 pr-4 text-sm outline-none focus:border-blue-500/50 transition-all text-white placeholder-gray-600" placeholder="密码" />
                                </div>
                                <div className="flex gap-3">
                                    <div className="relative group flex-1">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors"><Icon name="CheckCircle" /></div>
                                        <input required className="w-full bg-black/40 border border-white/5 rounded-xl py-3.5 pl-12 pr-4 text-sm outline-none focus:border-blue-500/50 transition-all text-white" placeholder="验证码" />
                                    </div>
                                    <div className="w-24 h-[50px] bg-white/5 rounded-xl flex items-center justify-center font-bold text-blue-400 tracking-widest cursor-pointer select-none border border-white/5 hover:bg-white/10 transition-colors" onClick={refreshCode}>
                                        {verifyCode}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center justify-between text-[11px] font-bold uppercase tracking-widest text-gray-500">
                                <label className="flex items-center gap-2 cursor-pointer hover:text-white transition-colors">
                                    <input type="checkbox" className="accent-blue-600" /> <span>自动登录</span>
                                </label>
                                <span className="hover:text-blue-500 cursor-pointer transition-colors">忘记密码？</span>
                            </div>

                            <button disabled={loading} className="w-full py-4 rounded-xl bg-blue-600 text-[12px] font-bold uppercase tracking-[0.3em] shadow-lg shadow-blue-600/30 flex items-center justify-center gap-3 transition-all hover:bg-blue-500 hover:scale-[1.02] active:scale-95">
                                {loading ? <Icon name="Loader" className="animate-spin" /> : <span>登 录 系 统</span>}
                                {!loading && <Icon name="ArrowRight" />}
                            </button>
                        </form>
                        
                        <div className="mt-10 text-center flex items-center justify-center gap-8 border-t border-white/5 pt-8">
                            <Icon name="Github" className="text-gray-500 hover:text-white cursor-pointer" />
                            <Icon name="Globe" className="text-gray-500 hover:text-white cursor-pointer" />
                            <Icon name="Mail" className="text-gray-500 hover:text-white cursor-pointer" />
                        </div>
                    </div>
                </div>
            );
        };

        // --- Dashboard Content ---
        const DashboardPage = ({ dynamicStats }) => (
            <div className="space-y-8 fade-in">
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div className="glass-card p-6 rounded-2xl relative overflow-hidden group">
                        <div className="mb-4 w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500"><Icon name="Bot" className="w-6 h-6" /></div>
                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">活跃单位</p>
                        <h3 className="text-3xl font-light font-headline tracking-tight">{dynamicStats.robots} / 1,284</h3>
                        <div className="absolute right-0 bottom-0 pointer-events-none opacity-5 group-hover:opacity-10 transition-opacity"><Icon name="Bot" className="w-24 h-24" /></div>
                    </div>
                    <div className="glass-card p-6 rounded-2xl">
                        <div className="mb-4 w-12 h-12 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-500"><Icon name="Zap" className="w-6 h-6" /></div>
                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">能耗指标</p>
                        <h3 className="text-3xl font-light font-headline tracking-tight">{dynamicStats.energy} kW</h3>
                    </div>
                    <div className="glass-card p-6 rounded-2xl">
                        <div className="mb-4 w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500"><Icon name="ShieldCheck" className="w-6 h-6" /></div>
                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">系统稳定性</p>
                        <h3 className="text-3xl font-light font-headline tracking-tight">99.98%</h3>
                    </div>
                    <div className="glass-card p-6 rounded-2xl relative">
                        <div className="mb-4 w-12 h-12 bg-red-500/10 rounded-xl flex items-center justify-center text-red-500"><Icon name="AlertTriangle" className="w-6 h-6" /></div>
                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">待处理警报</p>
                        <h3 className="text-3xl font-light font-headline tracking-tight">0{dynamicStats.alerts}</h3>
                        <div className="absolute top-4 right-4 h-2 w-2 rounded-full bg-red-500 animate-ping"></div>
                    </div>
                </div>

                <div className="grid grid-cols-12 gap-8">
                    <div className="col-span-12 lg:col-span-8 glass-card rounded-3xl p-8">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-xl font-headline tracking-widest uppercase opacity-80">实时吞吐量控制</h2>
                            <div className="flex gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">
                                <span className="text-blue-500 border-b border-blue-500 pb-1">24小时</span>
                                <span>7天</span>
                                <span>30天</span>
                            </div>
                        </div>
                        <div className="h-64 flex items-end justify-between px-2 gap-3">
                            {dynamicStats.chartData.map((h, i) => (
                                <div key={i} className="flex-1 bg-blue-600/10 rounded-t-xl relative group transition-all duration-1000" style={{ height: `${h}%` }}>
                                    <div className="absolute inset-x-0 bottom-0 h-1.5 bg-blue-600 rounded-full shadow-[0_0_15px_#3b82f6]"></div>
                                    <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[9px] font-bold py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity">{(h * 1.5).toFixed(0)} Mbps</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="col-span-12 lg:col-span-4 glass-card rounded-3xl p-8 flex flex-col items-center justify-center text-center">
                        <h2 className="text-xl font-headline tracking-widest uppercase mb-8 opacity-80">舰队 负载分配</h2>
                        <div className="relative w-56 h-56 flex items-center justify-center">
                            <svg className="w-full h-full -rotate-90 transform" viewBox="0 0 36 36">
                                <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="3" />
                                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#3b82f6" strokeWidth="3" strokeDasharray={`${dynamicStats.load}, 100`} strokeLinecap="round" className="transition-all duration-1000" />
                            </svg>
                            <div className="absolute">
                                <p className="text-4xl font-headline font-light">{dynamicStats.load}%</p>
                                <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">当前负载</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- Monitoring Content ---
        const MonitoringPage = () => {
            const [showAlerts, setShowAlerts] = useState(false);
            const [markers, setMarkers] = useState([
                { t: 30, l: 45, id: 1, type: 'bg-blue-600' },
                { t: 65, l: 25, id: 2, type: 'bg-red-600' },
                { t: 45, l: 75, id: 3, type: 'bg-blue-600' }
            ]);

            useInterval(() => {
                setMarkers(prev => prev.map(m => ({
                    ...m,
                    t: Math.max(10, Math.min(90, m.t + (Math.random() - 0.5) * 5)),
                    l: Math.max(10, Math.min(90, m.l + (Math.random() - 0.5) * 5))
                })));
            }, 3000);

            return (
                <div className="space-y-8 fade-in h-screen pb-32">
                    <div className="flex justify-between items-end">
                        <div>
                            <h2 className="text-4xl font-light font-headline uppercase tracking-tight">舰队 实时场境遥测</h2>
                            <p className="text-gray-500 mt-2 text-sm">正在监控 A-4 指挥节点下的 42 个独立单元。</p>
                        </div>
                        <div className="flex items-center gap-3 glass-card px-4 py-2 rounded-xl border border-white/5">
                            <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                            <span className="text-[10px] font-bold uppercase tracking-widest text-blue-500">实时加密链路已建立</span>
                        </div>
                    </div>

                    <div className="relative h-[650px] glass-card rounded-[40px] overflow-hidden border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                        <div className="absolute inset-0">
                            <img src="https://picsum.photos/seed/mapview/1600/1000?blur=5" className="w-full h-full object-cover opacity-10 grayscale brightness-50" referrerPolicy="no-referrer" />
                            <div className="absolute inset-0 bg-[#070b14]/40"></div>
                            
                            {/* Dynamic Markers */}
                            {markers.map(m => (
                                <div key={m.id} className="absolute transition-all duration-[3000ms] ease-in-out" style={{ top: `${m.t}%`, left: `${m.l}%` }}>
                                    <div className={`w-4 h-4 rounded-full ${m.type} shadow-[0_0_15px_rgba(59,130,246,0.6)] relative`}>
                                        <div className={`absolute inset-0 rounded-full ${m.type} animate-ping opacity-60`}></div>
                                    </div>
                                    <div className="absolute top-6 left-1/2 -translate-x-1/2 whitespace-nowrap glass-card px-2 py-1 rounded text-[8px] font-bold uppercase tracking-tighter opacity-0 hover:opacity-100 transition-opacity">单元 #{m.id * 1024}</div>
                                </div>
                            ))}
                        </div>

                        <div className="absolute top-8 left-8 glass-card px-6 py-3 rounded-2xl flex items-center gap-4 border border-white/10">
                            <Icon name="MapPin" className="text-blue-500 w-5 h-5" />
                            <div>
                                <p className="text-[10px] font-bold uppercase tracking-widest text-white">7-G 区指挥部</p>
                                <p className="text-[9px] text-gray-500 font-bold">格林威治标准时间同步中</p>
                            </div>
                        </div>

                        <div className="absolute bottom-8 right-8 flex flex-col gap-3">
                            <button className="p-3 glass-card rounded-2xl hover:bg-white/10 transition-colors border border-white/10"><Icon name="PlusCircle" className="w-5 h-5" /></button>
                            <button className="p-3 glass-card rounded-2xl hover:bg-white/10 transition-colors border border-white/10"><Icon name="MinusCircle" className="w-5 h-5" /></button>
                            <button className="p-3 glass-card rounded-2xl hover:bg-white/10 transition-colors border border-white/10 text-blue-400 border-blue-500/20"><Icon name="Layers" className="w-5 h-5" /></button>
                        </div>

                        {/* Collapsible Panel */}
                        <div className={`absolute top-0 right-0 bottom-0 shadow-2xl transition-all duration-700 ${showAlerts ? 'w-96 translate-x-0' : 'w-96 translate-x-full'}`}>
                            <div className="h-full glass-card p-10 border-l border-white/10 flex flex-col rounded-l-[40px]">
                                <div className="flex items-center justify-between mb-12">
                                    <div className="flex items-center gap-4">
                                        <div className="p-2 hover:bg-white/5 rounded-xl cursor-pointer transition-colors" onClick={() => setShowAlerts(false)}><Icon name="ChevronRight" className="w-6 h-6" /></div>
                                        <h3 className="text-2xl font-light font-headline uppercase tracking-widest italic opacity-80">关键警报</h3>
                                    </div>
                                    <span className="text-[10px] text-red-500 border border-red-500/50 px-3 py-1 rounded-lg font-bold uppercase tracking-widest shadow-[0_0_15px_rgba(239,68,68,0.2)]">1级优先级</span>
                                </div>
                                <div className="space-y-6 flex-1 overflow-y-auto custom-scrollbar pr-3">
                                    {[
                                        { t: '单元 #402：临界电量', d: '当前电池电量 12%。自动回归协议已启动，正在前往 H-2 充电桩。', ty: 'border-red-500', icon: 'BatteryLow', c: 'text-red-500' },
                                        { t: '路径碰撞预警', d: '传感器组在 B-9 通道检测到非标物体移动，正在重新计算避障路径。', ty: 'border-amber-500', icon: 'AlertTriangle', c: 'text-amber-500' },
                                        { t: '处理器过热', d: '核心处理节点 A-12 温度达到 88°C，建议降低任务负载。', ty: 'border-blue-500', icon: 'Thermometer', c: 'text-blue-500' },
                                        { t: '固件更新就绪', d: '感知引擎 v3.2 稳定版已就绪，将在下次休眠期间自动部署。', ty: 'border-emerald-500', icon: 'RefreshCw', c: 'text-emerald-500' }
                                    ].map((a, i) => (
                                        <div key={i} className={`p-6 glass-card rounded-3xl border-l-[3px] ${a.ty} hover:bg-white/5 transition-all cursor-default`}>
                                            <div className="flex items-center gap-3 mb-3">
                                                <Icon name={a.icon} className={a.c} />
                                                <p className={`text-xs font-bold uppercase tracking-widest ${a.c}`}>{a.t}</p>
                                            </div>
                                            <p className="text-[11px] text-gray-400 leading-relaxed font-medium">{a.d}</p>
                                            <div className="mt-4 text-[9px] text-gray-600 font-bold uppercase">检测时间: {i+1}分钟前</div>
                                        </div>
                                    ))}
                                </div>
                                <button className="mt-10 w-full py-5 glass-card rounded-2xl text-[10px] font-bold uppercase tracking-[0.3em] font-headline hover:bg-white/10 transition-all text-gray-400 hover:text-white">导出完整诊断报告</button>
                            </div>
                        </div>

                        {!showAlerts && (
                            <div className="absolute top-1/2 -translate-y-1/2 right-0">
                                <button onClick={() => setShowAlerts(true)} className="bg-blue-600/90 backdrop-blur-xl text-white py-6 px-3 rounded-l-3xl flex flex-col items-center gap-4 shadow-2xl hover:bg-blue-500 transition-all">
                                    <Icon name="ChevronLeft" className="w-5 h-5" />
                                    <span className="[writing-mode:vertical-lr] text-[10px] font-bold uppercase tracking-[0.3em]">警报记录</span>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Main App Controller ---
        const App = () => {
            const [isLogin, setLogin] = useState(false);
            const [active, setActive] = useState('仪表盘');
            const [dynamicStats, setDynamicStats] = useState({
                robots: 1242,
                energy: 428,
                alerts: 3,
                load: 72,
                chartData: [45, 60, 52, 85, 92, 48, 66, 74, 58, 80]
            });

            // --- Inactivity Timeout Logic (2 Minutes) ---
            const timeoutRef = useRef(null);
            const INACTIVITY_LIMIT = 2 * 60 * 1000; // 2 minutes

            const resetTimeout = useCallback(() => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                if (isLogin) {
                    timeoutRef.current = setTimeout(() => {
                        console.log("Inactivity detected. Returning to login.");
                        setLogin(false);
                    }, INACTIVITY_LIMIT);
                }
            }, [isLogin]);

            useEffect(() => {
                if (isLogin) {
                    const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
                    events.forEach(event => window.addEventListener(event, resetTimeout));
                    resetTimeout();
                    return () => {
                        events.forEach(event => window.removeEventListener(event, resetTimeout));
                        if (timeoutRef.current) clearTimeout(timeoutRef.current);
                    };
                }
            }, [isLogin, resetTimeout]);

            // Simulate Dynamic Stats
            useInterval(() => {
                if (!isLogin) return;
                setDynamicStats(prev => ({
                    ...prev,
                    energy: prev.energy + Math.floor((Math.random() - 0.5) * 10),
                    load: Math.max(20, Math.min(98, prev.load + Math.floor((Math.random() - 0.5) * 4))),
                    chartData: [...prev.chartData.slice(1), Math.max(10, Math.min(100, prev.chartData[prev.chartData.length-1] + (Math.random() - 0.5) * 20))]
                }));
            }, 3000);

            if (!isLogin) return <LoginPage onLogin={() => setLogin(true)} />;

            const navItems = [
                { id: '仪表盘', icon: 'LayoutDashboard' },
                { id: '设备管理', icon: 'Bot' },
                { id: '任务调度', icon: 'Calendar' },
                { id: '实时监控', icon: 'Activity' },
                { id: '系统日志', icon: 'History' },
                { id: '系统设置', icon: 'Settings' }
            ];

            return (
                <div className="flex h-screen overflow-hidden bg-bg-dark text-white selection:bg-blue-600/30">
                    <aside className="w-72 fixed h-full glass-card border-r border-white/5 py-10 flex flex-col items-center z-[200]">
                        <div className="flex items-center gap-4 mb-16 group cursor-pointer" onClick={() => setActive('仪表盘')}>
                            <div className="w-12 h-12 bg-blue-600 rounded-[14px] flex items-center justify-center shadow-[0_0_25px_rgba(59,130,246,0.4)] transition-all group-hover:scale-110"><Icon name="Cpu" className="w-7 h-7 text-white" /></div>
                            <div>
                                <h1 className="text-2xl font-bold font-headline uppercase tracking-tight text-white">精密核心</h1>
                                <p className="text-[9px] text-gray-500 font-bold uppercase tracking-[0.2em]">Fleet Control Node</p>
                            </div>
                        </div>
                        <nav className="w-full space-y-1">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setActive(item.id)} className={`w-full py-5 px-10 text-left text-[11px] font-bold uppercase tracking-[0.2em] transition-all relative flex items-center gap-5 ${active === item.id ? 'text-white' : 'text-gray-500 hover:text-white hover:bg-white/5 group'}`}>
                                    {active === item.id && <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-600 shadow-[2px_0_15px_rgba(59,130,246,0.5)]"></div>}
                                    <Icon name={item.icon} className={`w-5 h-5 transition-all ${active === item.id ? 'text-blue-500 scale-110' : 'opacity-30 group-hover:opacity-100 group-hover:scale-110'}`} />
                                    <span>{item.id}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto w-full px-6">
                            <div className="p-5 glass-card rounded-3xl border border-white/10 flex items-center gap-4 hover:bg-white/10 transition-colors cursor-pointer group">
                                <div className="w-11 h-11 bg-white/5 rounded-2xl flex items-center justify-center ring-1 ring-white/10 group-hover:ring-blue-500/50 transition-all overflow-hidden">
                                     <img src="https://picsum.photos/seed/admin/100/100" className="w-full h-full object-cover" />
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-xs font-bold text-white truncate">首席管理员</p>
                                    <p className="text-[10px] text-blue-500 font-bold uppercase tracking-wider">核心授权</p>
                                </div>
                                <Icon name="LogOut" className="text-gray-600 hover:text-red-500" />
                            </div>
                        </div>
                    </aside>

                    <main className="ml-72 flex-1 h-screen overflow-y-auto relative pt-28 pb-12 px-14 custom-scrollbar">
                        <header className="fixed top-0 left-72 right-0 h-20 glass-card border-b border-white/5 flex items-center justify-between px-14 z-[100]">
                            <div className="flex items-center gap-4 bg-white/5 border border-white/5 px-5 py-2.5 rounded-2xl w-96 group focus-within:border-blue-500/30 focus-within:bg-blue-500/5 transition-all">
                                <Icon name="Search" className="text-gray-500 group-focus-within:text-blue-500" />
                                <input className="bg-transparent border-none outline-none text-sm w-full font-medium" placeholder="搜索舰队资源、任务或日志..." />
                            </div>
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-emerald-500 italic">核心节点在线</p>
                                </div>
                                <div className="flex items-center gap-4">
                                    <button className="p-2.5 hover:bg-white/5 rounded-xl transition-colors text-gray-500 hover:text-white"><Icon name="Bell" className="w-6 h-6" /></button>
                                    <button className="p-2.5 hover:bg-white/5 rounded-xl transition-colors text-gray-500 hover:text-white"><Icon name="Maximize" className="w-6 h-6" /></button>
                                    <button className="p-2.5 hover:bg-white/5 rounded-xl transition-colors text-gray-500 hover:text-white"><Icon name="Settings" className="w-6 h-6" /></button>
                                </div>
                            </div>
                        </header>

                        <div className="max-w-[1400px] mx-auto">
                            {active === '仪表盘' && <DashboardPage dynamicStats={dynamicStats} />}
                            {active === '实时监控' && <MonitoringPage />}
                            {active === '设备管理' && <PlaceholderSection title="设备管理" icon="Bot" description="管理并配置舰队中所有自主单元的属性与协议。" />}
                            {active === '任务调度' && <PlaceholderSection title="任务调度" icon="Calendar" description="排定并监控复杂的自动化任务流与逻辑链。" />}
                            {active === '系统日志' && <PlaceholderSection title="系统日志" icon="History" description="访问来自所有分布式节点的原始遥测数据流。" />}
                            {active === '系统设置' && <PlaceholderSection title="系统设置" icon="Settings" description="微调系统内核参数、安全密钥与全局策略。" />}
                        </div>
                        <footer className="mt-24 border-t border-white/5 pt-10 text-center">
                            <p className="text-[9px] font-bold text-gray-600 uppercase tracking-[0.5em]">2026 PRECISION CORE SYSTEMS - 全球防御与舰队调度平台</p>
                        </footer>
                    </main>
                </div>
            );
        };

        const PlaceholderSection = ({ title, icon, description }) => (
            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center fade-in">
                <div className="w-32 h-32 bg-white/5 rounded-[40px] flex items-center justify-center text-white/10 mb-8 border border-white/5 shadow-inner">
                    <Icon name={icon} className="w-16 h-16 opacity-20" />
                </div>
                <h2 className="text-4xl font-light font-headline uppercase tracking-widest mb-4">{title}</h2>
                <div className="max-w-lg mb-10">
                    <p className="text-gray-500 text-sm leading-relaxed">{description}</p>
                    <p className="text-blue-500/40 text-[10px] uppercase font-bold tracking-widest mt-6">--- 正在同步该模块的数据流 ---</p>
                </div>
                <div className="flex gap-4">
                    <button className="px-8 py-3 bg-blue-600 text-[10px] font-bold uppercase tracking-widest rounded-xl shadow-lg shadow-blue-600/20 hover:bg-blue-500 transition-all">刷新数据节点</button>
                    <button className="px-8 py-3 glass-card text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-white/5 transition-all text-gray-400">导出当前视图</button>
                </div>
            </div>
        );

        // --- Render Root ---
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
